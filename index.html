<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Cheats</title>
    <style>
        /* Estilos básicos e reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Canvas do fundo com efeito de linhas/redes */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Container do Card Central */
        .card-container {
            background-color: rgba(18, 18, 18, 0.95);
            border: 1px solid rgba(255, 59, 48, 0.15);
            border-radius: 24px;
            padding: 30px 25px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(211, 47, 47, 0.1);
            z-index: 100;
            position: relative;
        }

        /* Foto/Logo acima do título */
        .logo-painel {
            width: 80px;
            height: 80px;
            border-radius: 14px;
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 0 12px rgba(211, 47, 47, 0.6); /* Brilho vermelho em volta da imagem */
            border: 1px solid rgba(211, 47, 47, 0.3);
        }

        /* Texto Superior */
        .titulo-vip {
            color: #ffffff;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        /* Botão Principal */
        .btn-painel {
            display: block;
            width: 100%;
            padding: 15px 0;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #d32f2f, #9a1f1f);
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
            border: none;
            outline: none;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-sizing: border-box;
        }

        /* Animação física de clique no iPhone */
        .btn-painel:active {
            transform: scale(0.94) translateY(3px) !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.6) !important;
            background: #b71c1c !important;
        }

        /* --- Estrutura do Alerta/Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background-color: #141414;
            border: 1px solid #262626;
            border-radius: 20px;
            padding: 24px;
            width: 80%;
            max-width: 290px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            transform: scale(0.85);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-title {
            color: #ff3b30;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .modal-text {
            color: #ffffff;
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* Botão Continuar */
        .btn-continuar {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            background-color: #d32f2f;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
            transition: transform 0.1s ease;
        }

        .btn-continuar:active {
            transform: scale(0.94) translateY(2px) !important;
            background-color: #b71c1c !important;
        }
    </style>
</head>
<body ontouchstart="">

    <canvas id="bg-canvas"></canvas>

    <div class="card-container">
        <img src="https://cdn.discordapp.com/attachments/1481068071669207141/1481396954712903916/IMG_0048.png?ex=6a13676d&is=6a1215ed&hm=9f98cfeab6fd940370e1cd9976712c87fde7c65104bb35c70e88123fca58af31&" alt="Logo" class="logo-painel">
        
        <div class="titulo-vip">FAELZIN VIP</div>
        <button class="btn-painel" onclick="mostrarAviso()">Abrir Painel</button>
    </div>

    <div class="modal-overlay" id="meuModal">
        <div class="modal-box">
            <div class="modal-title">Aviso</div>
            <div class="modal-text">ESSA É A VERSÃO DO BYPASS PRO DESEJA CONTINUAR?</div>
            <a href="trollspeed://" class="btn-continuar" onclick="fecharAviso()">Continuar</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 45; 
        const maxDistance = 110;  

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.8, 
                vy: (Math.random() - 0.5) * 0.8  
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particleCount; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(211, 47, 47, 0.7)';
                ctx.fill();

                for (let j = i + 1; j < particleCount; j++) {
                    let p2 = particles[j];
                    let dx = p.x - p2.x;
                    let dy = p.y - p2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < maxDistance) {
                        let alpha = (1 - (dist / maxDistance)) * 0.25;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(211, 47, 47, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        animate();

        function mostrarAviso() {
            document.getElementById('meuModal').classList.add('active');
        }

        function fecharAviso() {
            setTimeout(function() {
                document.getElementById('meuModal').classList.remove('active');
            }, 300);
        }
    </script>

</body>
</html>
